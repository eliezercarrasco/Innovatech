worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Directorios temporales accesibles por usuario no-root (nginx)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 8080;

        root  /usr/share/nginx/html;
        index index.html;

        # SPA React Router: rutas desconocidas devuelven index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse proxy -> backend-despachos (nombre de servicio Docker)
        location /api/v1/despachos {
            proxy_pass         http://backend-despachos:8081;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Reverse proxy -> backend-ventas (nombre de servicio Docker)
        location /api/v1/ventas {
            proxy_pass         http://backend-ventas:8081;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
