networks:
  innovatech-network:
    driver: bridge

volumes:
  mysql-despachos-data:
  mysql-ventas-data:

services:

  db-despachos:
    image: mysql:8.0
    container_name: db-despachos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: despachos_db
      MYSQL_USER: despachos_user
      MYSQL_PASSWORD: despachos_pass
    volumes:
      - mysql-despachos-data:/var/lib/mysql
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-ventas:
    image: mysql:8.0
    container_name: db-ventas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ventas_db
      MYSQL_USER: ventas_user
      MYSQL_PASSWORD: ventas_pass
    volumes:
      - mysql-ventas-data:/var/lib/mysql
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: backend-despachos
    restart: always
    environment:
      DB_ENDPOINT: db-despachos
      DB_PORT: 3306
      DB_NAME: despachos_db
      DB_USERNAME: despachos_user
      DB_PASSWORD: despachos_pass
    ports:
      - "8081:8081"
    networks:
      - innovatech-network
    depends_on:
      db-despachos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/api/v1/despachos"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: backend-ventas
    restart: always
    environment:
      DB_ENDPOINT: db-ventas
      DB_PORT: 3306
      DB_NAME: ventas_db
      DB_USERNAME: ventas_user
      DB_PASSWORD: ventas_pass
    ports:
      - "8082:8081"
    networks:
      - innovatech-network
    depends_on:
      db-ventas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/api/v1/ventas"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    environment:
      BACKEND_DESPACHOS_HOST: backend-despachos
      BACKEND_VENTAS_HOST: backend-ventas
    ports:
      - "80:8080"
    networks:
      - innovatech-network
    depends_on:
      backend-despachos:
        condition: service_healthy
      backend-ventas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
