name: CI/CD Backend Ventas - Deploy to EC2

on:
  push:
    branches:
      - deploy
    paths:
      - "back-Ventas_SpringBoot/**"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:${{ github.sha }} \
            ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:${{ github.sha }}

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.EC2_BACKEND_HOST != '' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:latest
            docker stop backend-ventas || true
            docker rm backend-ventas || true
            docker run -d \
              --name backend-ventas \
              --restart unless-stopped \
              -p 8082:8081 \
              -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:latest
