name: CI/CD Frontend - Deploy to EC2

on:
  push:
    branches:
      - main
      - deploy
    paths:
      - "front_despacho/**"
      - "docker-compose.prod.yml"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script_stop: true
          script: |
            set -e

            REPO_DIR=/home/ubuntu/innovatech
            REPO_URL=https://github.com/eliezercarrasco/Evaluacion2HerramientasDevops.git

            if [ -d "$REPO_DIR/.git" ]; then
              cd $REPO_DIR && git pull origin main
            else
              git clone $REPO_URL $REPO_DIR
              cd $REPO_DIR
            fi

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker compose -f $REPO_DIR/docker-compose.prod.yml pull frontend

            docker compose -f $REPO_DIR/docker-compose.prod.yml up -d --no-deps frontend

            docker image prune -f

            echo "Deploy frontend completado exitosamente"
